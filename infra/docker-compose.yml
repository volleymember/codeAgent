# 账号：admin
# 密码：7ce60f95d070448d8c928d07e0c54e74 / admin
# 从容器中获取：docker exec code-agent-jenkins cat /var/jenkins_home/secrets/initialAdminPassword
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: code-agent-jenkins
    environment:
      JAVA_OPTS: -Duser.timezone=Asia/Shanghai
      JENKINS_OPTS: --httpPort=8080
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
    restart: unless-stopped

  sonarqube-db:
    image: postgres:16-alpine
    container_name: code-agent-sonarqube-db
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    ports:
      - "5433:5432"
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10

# 账号：admin 更新密码：123456
  sonarqube:
    image: sonarqube:lts-community
    container_name: code-agent-sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
      SONAR_WEB_JAVAOPTS: -Xmx768m -Xms256m
      SONAR_CE_JAVAOPTS: -Xmx768m -Xms256m
      SONAR_SEARCH_JAVAOPTS: -Xmx512m -Xms512m
    ports:
      - "9002:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc: 8192
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: code-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: code-agent-etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd-data:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: code-agent-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus-data:/var/lib/milvus

volumes:
  jenkins-home:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  minio-data:
  etcd-data:
  milvus-data:
